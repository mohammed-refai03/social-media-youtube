<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta content="Page Not Found - Stackly" name="description"/>
<title>404 Not Found | Stackly</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Poppins:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<!-- Custom CSS -->
<link href="assets/css/style.css?v=2" rel="stylesheet"/>
<style>
        body, html {
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #f8fafc; /* Light sleek background */
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* 404 Container */
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* Continuous Streaming Wave Animation */
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            opacity: 0.1;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 200px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%232563eb" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: 50% 100%;
            animation: wave 10s linear infinite;
        }

        .wave:nth-child(2) {
            bottom: -20px;
            opacity: 0.5;
            animation: wave 15s linear infinite reverse;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="%2310b981" fill-opacity="1" d="M0,128L60,149.3C120,171,240,213,360,208C480,203,600,149,720,138.7C840,128,960,160,1080,186.7C1200,213,1320,235,1380,245.3L1440,256L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"></path></svg>');
            background-size: 50% 100%;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Endless Buffering Spinner */
        .buffering-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid rgba(37, 99, 235, 0.1);
            border-top-color: var(--primary-color);
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        .spinner-ring::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%;
            border: 8px solid transparent;
            border-bottom-color: var(--highlight-color);
            animation: spin 2s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .broken-video-icon {
            font-size: 3.5rem;
            color: var(--primary-color);
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.9); opacity: 0.7; }
        }

        /* Text Styling */
        .error-code {
            font-family: 'Poppins', sans-serif;
            font-size: 6rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .error-message {
            color: #64748b;
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 1.5rem;
        }

        /* Clean White Card */
        .content-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 600px;
        }

        /* Mobile Responsive Adjustments */
        @media (max-width: 576px) {
            .content-card {
                padding: 1.5rem 1rem;
                border-radius: 20px;
            }
            .buffering-container {
                width: 80px;
                height: 80px;
                margin: 0 auto 1rem;
            }
            .broken-video-icon {
                font-size: 2rem;
            }
            .error-code {
                font-size: 4rem;
            }
            .error-message {
                font-size: 0.9rem;
                margin: 0 auto 1rem;
            }
            .content-card h3 {
                font-size: 1.25rem;
                margin-bottom: 0.5rem !important;
            }
            .content-card .btn {
                padding: 0.5rem 1.5rem !important;
                font-size: 0.9rem;
            }
            .content-card .btn i {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<!-- Background Animation -->
<div class="wave-container">
<div class="wave"></div>
<div class="wave"></div>
</div>
<!-- Main Content -->
<main class="error-container px-3 py-5">
<div class="content-card">
<!-- Buffering Animation -->
<div class="buffering-container">
<div class="spinner-ring"></div>
<i class="fa-solid fa-video-slash broken-video-icon"></i>
</div>
<!-- Text Content -->
<h1 class="error-code">404</h1>
<h3 class="fw-bold mb-3" style="color: #334155;">Stream Disconnected</h3>
<p class="error-message">
                Whoops! We are still buffering... just kidding. The page or video you are looking for doesn't exist or was removed.
            </p>
<!-- Buttons -->
<div class="d-flex flex-wrap justify-content-center gap-3">
<a class="btn btn-primary btn-lg rounded-pill px-5 hover-scale transition shadow-sm d-flex align-items-center" href="index.html">
<i class="fa-solid fa-house me-2"></i> Return Home
                </a>
<button class="btn btn-outline-dark btn-lg rounded-pill px-5 hover-scale transition d-flex align-items-center" onclick="window.history.back(); return false;">
<i class="fa-solid fa-arrow-left me-2"></i> Go Back
                </button>
</div>
</div>
</main>
<!-- Custom Cursor Initialization -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="assets/js/animations.js?v=3"></script>
<script src="assets/js/force-404.js?v=4"></script>
</body>
</html>
